<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאגר שאלות - תכנון מונחה עצמים</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 font-sans text-gray-900">
    <div class="max-w-4xl mx-auto">
        
        <header class="mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">מאגר שאלות</h1>
            <p class="text-gray-600">תרגול וחזרה על עקרונות עיצוב תוכנה</p>
        </header>

        <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-100 mb-6 flex flex-wrap gap-6 items-end">
            
            <div class="flex flex-col gap-1">
                <label for="categoryFilter" class="text-sm font-medium text-gray-600">נושא:</label>
                <select id="categoryFilter" class="border border-gray-300 rounded-md p-2 bg-gray-50 focus:ring-blue-500 focus:border-blue-500 min-w-[150px]">
                    <option value="all">הצג הכל</option>
                    </select>
            </div>

            <div class="flex flex-col gap-1">
                <label for="typeFilter" class="text-sm font-medium text-gray-600">סוג שאלה:</label>
                <select id="typeFilter" class="border border-gray-300 rounded-md p-2 bg-gray-50 focus:ring-blue-500 focus:border-blue-500 min-w-[150px]">
                    <option value="all">הצג הכל</option>
                    <option value="Open">שאלות פתוחות</option>
                    <option value="Multiple Choice">שאלות אמריקאיות</option>
                </select>
            </div>
            <div class="flex flex-col gap-1">
                <label for="languageFilter" class="text-sm font-medium text-gray-600">שפה:</label>
                <select id="languageFilter" class="border border-gray-300 rounded-md p-2 bg-gray-50 focus:ring-blue-500 focus:border-blue-500 min-w-[150px]">
                    <option value="all">הצג הכל</option>
                    <option value="Hebrew">עברית</option>
                    <option value="English">English</option>
                </select>
            </div>
            <div class="flex flex-col gap-1">
                <label for="sortOrder" class="text-sm font-medium text-gray-600">סדר הצגה:</label>
                <select id="sortOrder" class="border border-gray-300 rounded-md p-2 bg-gray-50 focus:ring-blue-500 focus:border-blue-500 min-w-[150px]">
                    <option value="desc">מהחדש לישן</option>
                    <option value="asc">מהישן לחדש</option>
                </select>
            </div>

        </div>

        <div id="questionsContainer" class="space-y-4">
            <p id="loadingMsg" class="text-gray-500">טוען שאלות...</p>
        </div>

    </div>

    <script>
        let allQuestions = [];

        async function loadQuestions() {
            try {
                const response = await fetch('./data/database.json');
                allQuestions = await response.json();
                
                populateCategoryFilter();
                applyFiltersAndSort(); // קריאה ראשונית להצגת הכל מסודר

                // האזנה לשינויים בכל אחד מהתפריטים
                document.getElementById('categoryFilter').addEventListener('change', applyFiltersAndSort);
                document.getElementById('typeFilter').addEventListener('change', applyFiltersAndSort);
                document.getElementById('sortOrder').addEventListener('change', applyFiltersAndSort);
                document.getElementById('languageFilter').addEventListener('change', applyFiltersAndSort);
            } catch (error) {
                console.error("Error loading database:", error);
                document.getElementById('loadingMsg').innerText = "שגיאה בטעינת מאגר השאלות.";
            }
        }

        function populateCategoryFilter() {
            const filterSelect = document.getElementById('categoryFilter');
            const mainCategories = new Set();

            allQuestions.forEach(q => {
                if (q.topics && Array.isArray(q.topics)) {
                    q.topics.forEach(topic => {
                        const mainCategory = topic.split(' - ')[0].trim();
                        mainCategories.add(mainCategory);
                    });
                }
            });

            Array.from(mainCategories).sort().forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                filterSelect.appendChild(option);
            });
        }

        // הפונקציה המרכזית שמפעילה את כל המסננים והמיון ביחד
        function applyFiltersAndSort() {
            const selectedCategory = document.getElementById('categoryFilter').value;
            const selectedType = document.getElementById('typeFilter').value;
            const selectedLanguage = document.getElementById('languageFilter').value; // <-- קליטת השפה
            const sortOrder = document.getElementById('sortOrder').value;

            // 1. חיתוך (סינון)
            let filtered = allQuestions.filter(q => {
                const matchCategory = selectedCategory === "all" || 
                                      (q.topics && q.topics.some(topic => topic.startsWith(selectedCategory)));
                
                const matchType = selectedType === "all" || q.type === selectedType;
                
                // בדיקת שפה (אם חסר השדה במבחנים ישנים, נניח עברית כברירת מחדל כדי לא לשבור כלום)
                const qLang = q.language || "Hebrew";
                const matchLanguage = selectedLanguage === "all" || qLang === selectedLanguage;

                return matchCategory && matchType && matchLanguage; // <-- הוספת השפה לתנאי
            });
            
            // 2. מיון
            filtered.sort((a, b) => {
                // השוואת שנים
                if (a.year !== b.year) {
                    return sortOrder === 'desc' ? b.year - a.year : a.year - b.year;
                }
                // אם השנה זהה, השוואת סמסטרים (A, B, C)
                if (a.semester !== b.semester) {
                    return sortOrder === 'desc' ? b.semester.localeCompare(a.semester) : a.semester.localeCompare(b.semester);
                }
                // אם הסמסטר זהה, השוואת מועדים (A, B, C)
                if (a.moed !== b.moed) {
                    return sortOrder === 'desc' ? b.moed.localeCompare(a.moed) : a.moed.localeCompare(b.moed);
                }
                return 0; // הכל זהה
            });

            // 3. תצוגה
            renderQuestions(filtered);
        }

        function renderQuestions(questionsToRender) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = ''; 

            if (questionsToRender.length === 0) {
                container.innerHTML = '<p class="text-gray-500 bg-white p-6 rounded-lg text-center border">לא נמצאו שאלות התואמות לסינון המבוקש.</p>';
                return;
            }

            questionsToRender.forEach(q => {
                const card = document.createElement('a');
                card.href = `question.html?id=${q.id}`;
                card.className = "block bg-white p-6 rounded-lg shadow-sm border border-gray-100 hover:shadow-md hover:border-blue-300 transition duration-200 cursor-pointer text-inherit no-underline";
                
                let badgesHtml = '';
                if (q.topics && q.topics.length > 0) {
                    badgesHtml = `<div class="mt-4 flex flex-wrap gap-2">` + 
                        q.topics.map(t => `<span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full border border-blue-200">${t}</span>`).join('') +
                        `</div>`;
                }

                // תרגום יפה לסוג השאלה בתגית העליונה
                const typeDisplay = q.type === "Open" ? "שאלה פתוחה" : "אמריקאית";

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h2 class="text-xl font-semibold text-blue-700">${q.title || 'שאלה ללא כותרת'}</h2>
                        <span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded border whitespace-nowrap mr-4">${typeDisplay}</span>
                    </div>
                    <p class="text-sm text-gray-500">שנה: ${q.year} | סמסטר ${q.semester} מועד ${q.moed}</p>
                    ${badgesHtml}
                `;
                container.appendChild(card);
            });
        }

        loadQuestions();
    </script>
</body>
</html>
