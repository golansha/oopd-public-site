<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOP & Design - Question Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 font-sans text-gray-900">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-blue-900">מאגר שאלות - עיצוב ותכנות מונחה עצמים</h1>
            <p class="text-gray-600 mt-2">סנן וחפש שאלות ממבחני עבר</p>
        </header>

        <div class="bg-white p-4 rounded-lg shadow-sm mb-6 flex gap-4">
            <input type="text" id="searchInput" placeholder="חיפוש חופשי (למשל: SOLID)..." 
                   class="w-full p-2 border rounded focus:outline-none focus:border-blue-500">
        </div>

        <div id="questionList" class="space-y-4">
            </div>
    </div>

    <script>
        // Fetch the JSON database and render it
        async function loadQuestions() {
            try {
                const response = await fetch('./data/database.json');
                const questions = await response.json();
                
                const container = document.getElementById('questionList');
                container.innerHTML = ''; // Clear loading state

                questions.forEach(q => {
                    // Create a card for each question
                    const card = document.createElement('div');
                    card.className = 'bg-white p-5 rounded-lg shadow-sm border border-gray-100 hover:shadow-md transition';
                    
                    // Render tags safely
                    const tagsHtml = (q.topics || []).map(t => 
                        `<span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">${t}</span>`
                    ).join('');

                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <h2 class="text-xl font-bold text-gray-800 mb-1">${q.title}</h2>
                                <p class="text-sm text-gray-500 mb-3">שנה: ${q.year} | סמסטר ${q.semester} מועד ${q.moed} | סוג: ${q.type || 'לא מוגדר'}</p>                            </div>
                        </div>
                        <div class="flex gap-2 mb-4">
                            ${tagsHtml}
                        </div>
                        <a href="question.html?id=${q.id}" class="text-blue-600 hover:underline text-sm font-medium">
                            צפה בשאלה ←
                        </a>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error("Error loading the database:", error);
                document.getElementById('questionList').innerHTML = 
                    '<p class="text-red-500">שגיאה בטעינת הנתונים. ודא שהפעלת שרת מקומי (Live Server).</p>';
            }
        }

        // Initialize
        loadQuestions();
    </script>
</body>
</html>
