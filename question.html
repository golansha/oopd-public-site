<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צפייה בשאלה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-50 p-8 font-sans text-gray-900">
    <div class="max-w-4xl mx-auto">
        
        <a href="index.html" class="inline-flex items-center text-blue-600 hover:text-blue-800 mb-6 font-medium">
            &rarr; חזרה למאגר השאלות
        </a>

        <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-100">
            
            <div class="border-b pb-4 mb-6">
                <h1 id="qTitle" class="text-3xl font-bold text-gray-800 mb-2">טוען שאלה...</h1>
                <p id="qMeta" class="text-gray-500"></p>
            </div>

            <div id="markdownContent" class="text-lg leading-relaxed space-y-4"></div>
            <div id="solutionContainer" class="mt-8 hidden">
                <button id="toggleAnswerBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-md shadow-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                    הצג פתרון
                </button>
                
                <div id="answerSection" class="hidden mt-6 p-6 bg-blue-50/50 border border-blue-100 rounded-lg shadow-inner">
                    <h3 class="text-xl font-bold text-blue-800 mb-4 border-b border-blue-200 pb-2">פתרון:</h3>
                    <div id="answerContent" class="text-lg leading-relaxed space-y-4"></div>
                </div>
            </div>
            <div id="imageContainer" class="mt-8 hidden">
                <img id="qImage" src="" alt="תרשים נלווה" class="max-w-full border rounded shadow-sm">
            </div>
            
        </div>
    </div>

<script>
        async function loadQuestion() {
            const urlParams = new URLSearchParams(window.location.search);
            const questionId = urlParams.get('id');

            if (!questionId) {
                document.getElementById('qTitle').innerText = 'שגיאה: לא נבחרה שאלה';
                return;
            }

            try {
                const dbResponse = await fetch('./data/database.json');
                const questions = await dbResponse.json();
                const question = questions.find(q => q.id === questionId);

                if (!question) {
                    document.getElementById('qTitle').innerText = 'השאלה לא נמצאה';
                    return;
                }

                document.getElementById('qTitle').innerText = question.title;
                document.getElementById('qMeta').innerText = `שנה: ${question.year} | סמסטר ${question.semester} מועד ${question.moed} | סוג: ${question.type}`;

                // בניית התוכן מתוך ה-JSON
                let constructedMarkdown = '';
                
                if (question.question_text) {
                    constructedMarkdown += `### השאלה\n${question.question_text}\n\n`;
                }

                if (question.options && question.options.length > 0) {
                    constructedMarkdown += `### אפשרויות\n`;
                    question.options.forEach(opt => {
                        constructedMarkdown += `- ${opt}\n`; // יצירת פריט רשימה תקני
                    });
                    constructedMarkdown += `\n`;
                }

                // 1. ציור השאלה והאפשרויות (ללא הפתרון)
                document.getElementById('markdownContent').innerHTML = marked.parse(constructedMarkdown);

                // 2. טיפול בפתרון (אם קיים)
                if (question.answer_text) {
                    const solutionContainer = document.getElementById('solutionContainer');
                    const answerSection = document.getElementById('answerSection');
                    const toggleBtn = document.getElementById('toggleAnswerBtn');
                    const answerContent = document.getElementById('answerContent');

                    // מציג את אזור הכפתור
                    solutionContainer.classList.remove('hidden');
                    
                    // מפענח את המארקדאון של הפתרון לתוך הדיב הנסתר
                    answerContent.innerHTML = marked.parse(question.answer_text);

                    // לוגיקת הלחיצה על הכפתור
                    toggleBtn.addEventListener('click', () => {
                        if (answerSection.classList.contains('hidden')) {
                            answerSection.classList.remove('hidden');
                            toggleBtn.innerText = 'הסתר פתרון';
                            toggleBtn.classList.replace('bg-blue-600', 'bg-gray-600');
                            toggleBtn.classList.replace('hover:bg-blue-700', 'hover:bg-gray-700');
                            toggleBtn.classList.replace('focus:ring-blue-500', 'focus:ring-gray-500');
                        } else {
                            answerSection.classList.add('hidden');
                            toggleBtn.innerText = 'הצג פתרון';
                            toggleBtn.classList.replace('bg-gray-600', 'bg-blue-600');
                            toggleBtn.classList.replace('hover:bg-gray-700', 'hover:bg-blue-700');
                            toggleBtn.classList.replace('focus:ring-gray-500', 'focus:ring-blue-500');
                        }
                    });
                }
            } catch (error) {
                console.error("Error loading question:", error);
                document.getElementById('qTitle').innerText = 'שגיאה בטעינת הנתונים';
            }
        }

        loadQuestion();
    </script>
    <style>
        #markdownContent code, #answerContent code {
                direction: ltr !important;
                unicode-bidi: isolate;
                display: inline-block;
                background-color: #f3f4f6;
                padding: 0.1em 0.3em;
                border-radius: 0.25rem;
                font-family: monospace;
        }
        #markdownContent ul, #answerContent ul { list-style: none; padding: 0; }
        #markdownContent li, #answerContent li { margin-bottom: 0.5rem; padding: 0.5rem; background-color: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.25rem; }
        #markdownContent pre, #answerContent pre { 
            background: #1e293b; 
            color: #f8fafc; 
            padding: 1.5rem; 
            border-radius: 0.5rem; 
            direction: ltr !important; 
            text-align: left !important; 
            overflow-x: auto; 
            margin-top: 1rem; 
            margin-bottom: 1rem;
        }
        #markdownContent pre code, #answerContent pre code { 
            background: transparent; 
            padding: 0; 
            color: inherit; 
        }
    </style>
</body>
</html>
